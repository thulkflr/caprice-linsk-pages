<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caprice Photography | كابريس للتصوير</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* الألوان الأساسية المستوحاة من اللوجو */
    :root {
      --gold: #e0d477;
      --dark-bg: #0d0d0d;
      --card-bg: rgba(20, 20, 20, 0.85);
      --light-text: #f0f0f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      /* خلفية متدرجة فخمة ومريحة للعين */
      background: radial-gradient(circle at top, #202020, var(--dark-bg));
      color: var(--light-text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      max-width: 450px;
      width: 100%;
      text-align: center;
      background: var(--card-bg);
      padding: 40px 30px;
      border-radius: 24px;
      border: 1px solid rgba(212, 175, 55, 0.15);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
      /* حركة ظهور ناعمة */
      animation: fadeIn 1s ease-in-out;
      backdrop-filter: blur(10px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      height: 180px;
      width: 160px;
      margin-bottom: 20px;
    }

    h1 {
      color: var(--gold);
      font-size: 28px;

      font-weight: 700;
      letter-spacing: 1px;
    }

    h2 {
      color: var(--gold);
      font-size: 22px;
      margin-bottom: 10px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .description {
      font-size: 15px;
      color: #b3b3b3;
      margin-bottom: 30px;
      line-height: 1.7;
    }

    .highlight {
      display: block;
      color: var(--gold);
      font-weight: 500;
      margin-top: 8px;
      font-size: 16px;
    }

    .links-wrapper {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      background: transparent;
      color: var(--gold);
      text-decoration: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      border: 1px solid rgba(236, 208, 113, 0.5);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn i {
      font-size: 22px;
    }

    /* تأثير عند تمرير الماوس */
    .btn:hover {
      background: var(--gold);
      color: var(--dark-bg);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.25);
      border-color: var(--gold);
    }

    .footer {
      margin-top: 35px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="Background.png" alt="Caprice Photography" class="logo">

    <h1>CAPRICE</h1>
    <h2>STUDIO & PHOTOGRAPHY</h2>

    <p class="description">
      نوثّق لحظاتكم بلمسة فنية احترافية، من التصوير المدرسي إلى إبراز أدق تفاصيل منتجاتكم.
      <span class="highlight">"نجمد الزمن.. لنخلد أجمل ذكرياتكم بفخامة."</span>
    </p>

    <div class="links-wrapper">
      <a href="tel:+962 7 8075 7179" class="btn">
        <i class="fas fa-phone-alt"></i>
        اتصل بنا
      </a>

      <a href="https://wa.me/962780757179" class="btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
        تواصل عبر واتساب
      </a>

      <a href="https://www.instagram.com/cprc.phtgjo?igsh=b3FudnFydXY0M3Jw&utm_source=qr" class="btn" target="_blank">
        <i class="fab fa-instagram"></i>
        انستغرام
      </a>

      <a href="https://www.facebook.com/share/18QjBYKYj6/?mibextid=wwXIfr" class="btn" target="_blank">
        <i class="fab fa-facebook-f"></i>
        فيسبوك
      </a>

      <a href="mailto:caprice.studio.buzz@gmail.com" class="btn">
        <i class="fas fa-envelope"></i>
        البريد الإلكتروني
      </a>
    </div>

    <div class="footer">
      © 2026 Caprice Photography. جميع الحقوق محفوظة.
    </div>
  </div>

</body>

</html>
